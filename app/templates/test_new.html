{% extends "layout_dashboard.html" %}
{% block title %}Новый тест{% endblock %}
{% block dashboard_body %}
  <div class="dash-page-card dash-form">
    <h1>Новый тест</h1>
    {% if error %}<p class="auth-error">{{ error }}</p>{% endif %}
    <form method="post" action="/tests/new">
      <label for="title">Название</label>
      <input id="title" name="title" type="text" required maxlength="200" />
      <label for="description">Описание (необязательно)</label>
      <textarea id="description" name="description" maxlength="4000"></textarea>
      <p style="margin-top:1rem;">
        <button type="submit" class="dash-exam-btn" style="border:none;cursor:pointer;">Далее — билеты</button>
        <a href="/cabinet" class="dash-card-link" style="margin-left:1rem;">Отмена</a>
      </p>
    </form>
  </div>
{% endblock %}
