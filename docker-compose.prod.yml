services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: exam_tests
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build:
      context: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/exam_tests
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-https://example.com}
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_HTTPONLY: "true"
      SESSION_COOKIE_SAMESITE: lax
      REDIS_URL: redis://redis:6379/0
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: "120"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-300}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      AUTO_CREATE_SCHEMA: "false"
      RUN_MIGRATIONS: "true"
      EXPORT_TASK_TTL_SECONDS: ${EXPORT_TASK_TTL_SECONDS:-3600}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  db_data:
